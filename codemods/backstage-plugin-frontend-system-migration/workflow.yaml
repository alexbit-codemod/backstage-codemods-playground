# yaml-language-server: $schema=https://raw.githubusercontent.com/codemod/codemod/refs/heads/main/schemas/workflow.json

version: "1"

params:
  schema:
    run_ai_followups:
      name: "Run AI follow-ups"
      description: "AI-assisted edits for SubPageBlueprint, useRouteRef guards, external route defaults (off by default)."
      type: boolean
      default: false
    update_package_dependencies:
      name: "Update package.json and lockfile"
      description: "Remove legacy @backstage/core-* deps and add @backstage/frontend-plugin-api via Yarn (off by default)."
      type: boolean
      default: false

nodes:
  # Deterministic JSSG runs as one js-ast-grep step (`scripts/unified.ts` chains inventory →
  # route-refs → plugin-shell → apis → pages-hooks). Optional AI/package follow the same node.
  # Codemod Cloud: one automatic node = one task (avoids parallel `.git/index.lock` conflicts).
  - id: deterministic-nfs-migration
    name: NFS migration (metrics + JSSG + optional follow-ups)
    type: automatic
    steps:
      - name: NFS migration (unified JSSG)
        js-ast-grep:
          js_file: scripts/unified.ts
          language: tsx
          include:
            - "**/*.ts"
            - "**/*.tsx"
          exclude:
            - "**/node_modules/**"

      # Optional: gated by params (default off). Same single task as above.
      - name: AI-assisted tricky migrations
        if: params.run_ai_followups == true
        ai:
          model: "gpt-5.2-codex"
          prompt: |
            You are migrating a Backstage plugin to the new frontend system (NFS).
            Focus on files that still use legacy patterns after deterministic codemods:
            - Internal react-router Routes/Route that should become SubPageBlueprint tabs (top-level tabs only).
            - useRouteRef results that need undefined guards for external route refs.
            - createExternalRouteRef entries missing defaultTarget.
            Apply minimal edits using @backstage/frontend-plugin-api and @backstage/ui.
          system_prompt: |
            You are an expert in Backstage frontend-plugin-api and the extension system.

      - name: Remove legacy core deps and add frontend-plugin-api
        if: params.update_package_dependencies == true
        run: |
          set -eu
          ROOT="${CODEMOD_TARGET:-${CODEMOD_TARGET_PATH:-.}}"
          cd "$ROOT"
          test -f package.json || exit 0
          if ! grep -qE '@backstage/core-plugin-api|@backstage/core-compat-api' package.json; then
            exit 0
          fi
          yarn remove @backstage/core-plugin-api @backstage/core-compat-api 2>/dev/null || true
          yarn add @backstage/frontend-plugin-api@^1.0.0
